<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航按钮拟态玻璃效果对比 🪟</title>
  <style>
    /* ========================================================
       🌐 全局 CSS 变量：日间 & 夜间主题
       ======================================================== */

    /* 日间模式 (浅色) ☀️ */
    :root {
      --page-bg:            linear-gradient(160deg, #e4e8f0 0%, #eef0f4 40%, #e6eaf2 100%);
      --page-bg-alt:        #e4e8ee;
      --text-primary:       rgba(0, 0, 0, 0.85);
      --text-secondary:     rgba(0, 0, 0, 0.55);
      --badge-bg:           rgba(0, 0, 0, 0.06);
      --badge-text:         rgba(0, 0, 0, 0.5);
      --section-title:      rgba(0, 0, 0, 0.6);

      /* 方法一：box-shadow + RGBA */
      --m1-btn-bg:          rgba(255, 255, 255, 0.35);
      --m1-btn-border:      rgba(255, 255, 255, 0.5);
      --m1-btn-color:       rgba(0, 0, 0, 0.8);
      --m1-btn-hover-bg:    rgba(255, 255, 255, 0.5);
      --m1-btn-active-bg:   rgba(255, 255, 255, 0.55);
      --m1-btn-shadow:      0 4px 16px rgba(0, 0, 0, 0.06);

      /* 方法二：伪元素模糊 */
      --m2-btn-border:      rgba(0, 0, 0, 0.08);
      --m2-btn-color:       rgba(0, 0, 0, 0.8);
      --m2-btn-shadow:      0 4px 16px rgba(0, 0, 0, 0.06);
      --m2-pseudo-bg:       linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 60%);
      --m2-pseudo-filter:   blur(6px);

      /* 方法三：Apple Liquid Glass  */
      --m3-backdrop-filter: blur(20px) saturate(180%);
      --m3-bar-box-shadow:  inset 0 1px 0 rgba(255, 255, 255, 0.6), 0 8px 32px rgba(0, 0, 0, 0.10);
      --m3-bar-bg-1:        radial-gradient(ellipse at 20% 30%, rgba(180, 210, 255, 0.30) 0%, transparent 50%);
      --m3-bar-bg-2:        radial-gradient(ellipse at 80% 70%, rgba(220, 180, 255, 0.22) 0%, transparent 50%);
      --m3-bar-bg-3:        radial-gradient(ellipse at 50% 100%, rgba(255, 200, 120, 0.10) 0%, transparent 40%);
      --m3-bar-base:        linear-gradient(145deg, #dce2ec 0%, #d0d6e4 100%);
      --m3-btn-bg:          rgba(255, 255, 255, 0.55);
      --m3-btn-border:      rgba(255, 255, 255, 0.85);
      --m3-btn-color:       rgba(0, 0, 0, 0.85);
      --m3-btn-shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.90);
      --m3-btn-shadow-drop: 0 4px 12px rgba(0, 0, 0, 0.08);
      --m3-highlight:       linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.15) 35%, transparent 60%, rgba(255,255,255,0.05) 85%, rgba(255,255,255,0.12) 100%);
      --m3-hover-bg:        rgba(255, 255, 255, 0.60);
      --m3-active-bg:       rgba(255, 255, 255, 0.65);
      --m3-active-color:    rgba(0, 0, 0, 0.95);
      --m3-active-border:   rgba(255, 255, 255, 0.8);
      --m3-active-shadow:   inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 4px 24px rgba(80, 120, 220, 0.12);
      --m3-indicator-bar:   rgba(60, 100, 200, 0.5);
      --m3-indicator-glow:  rgba(60, 100, 200, 0.2);

      /* 切换按钮 */
      --toggle-bg:          rgba(255, 255, 255, 0.50);
      --toggle-border:      rgba(0, 0, 0, 0.08);
      --toggle-color:       rgba(0, 0, 0, 0.70);
      --toggle-hover-bg:    rgba(255, 255, 255, 0.70);
    }

    /* 🌙 夜间模式 */
    body.theme-dark {
      --page-bg:            #0d0d1a;
      --page-bg-alt:        #13132a;
      --text-primary:       rgba(255, 255, 255, 0.90);
      --text-secondary:     rgba(255, 255, 255, 0.50);
      --badge-bg:           rgba(255, 255, 255, 0.08);
      --badge-text:         rgba(255, 255, 255, 0.45);
      --section-title:      rgba(255, 255, 255, 0.55);

      /* 方法一 */
      --m1-btn-bg:          rgba(255, 255, 255, 0.08);
      --m1-btn-border:      rgba(255, 255, 255, 0.1);
      --m1-btn-color:       rgba(255, 255, 255, 0.85);
      --m1-btn-hover-bg:    rgba(255, 255, 255, 0.14);
      --m1-btn-active-bg:   rgba(255, 255, 255, 0.18);
      --m1-btn-shadow:      0 4px 16px rgba(0, 0, 0, 0.15);

      /* 方法二 */
      --m2-btn-border:      rgba(255, 255, 255, 0.12);
      --m2-btn-color:       rgba(255, 255, 255, 0.85);
      --m2-btn-shadow:      0 4px 16px rgba(0, 0, 0, 0.18);
      --m2-pseudo-bg:       linear-gradient(135deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.06) 50%, rgba(200,220,255,0.10) 100%);
      --m2-pseudo-filter:   blur(8px);

      /* 方法三 */
      --m3-backdrop-filter: blur(20px) saturate(180%);
      --m3-bar-box-shadow:  inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 8px 32px rgba(0, 0, 0, 0.25);
      --m3-bar-bg-1:        radial-gradient(ellipse at 20% 40%, rgba(100, 150, 255, 0.18) 0%, transparent 55%);
      --m3-bar-bg-2:        radial-gradient(ellipse at 80% 60%, rgba(180, 100, 230, 0.12) 0%, transparent 50%);
      --m3-bar-bg-3:        radial-gradient(ellipse at 50% 100%, rgba(255, 180, 100, 0.06) 0%, transparent 40%);
      --m3-bar-base:        linear-gradient(145deg, #1c1c2e 0%, #2a2a3e 100%);
      --m3-btn-bg:          rgba(255, 255, 255, 0.08);
      --m3-btn-border:      rgba(255, 255, 255, 0.25);
      --m3-btn-color:       rgba(255, 255, 255, 0.85);
      --m3-btn-shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.30);
      --m3-btn-shadow-drop: 0 4px 24px rgba(0, 0, 0, 0.15), 0 1px 4px rgba(0, 0, 0, 0.1);
      --m3-highlight:       linear-gradient(135deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.08) 30%, transparent 60%, rgba(255,255,255,0.03) 85%, rgba(255,255,255,0.08) 100%);
      --m3-hover-bg:        rgba(255, 255, 255, 0.12);
      --m3-active-bg:       rgba(255, 255, 255, 0.15);
      --m3-active-color:    rgba(255, 255, 255, 1);
      --m3-active-border:   rgba(255, 255, 255, 0.35);
      --m3-active-shadow:   inset 0 1px 0 rgba(255, 255, 255, 0.4), 0 4px 24px rgba(100, 140, 255, 0.15);
      --m3-indicator-bar:   rgba(255, 255, 255, 0.7);
      --m3-indicator-glow:  rgba(255, 255, 255, 0.3);

      /* 切换按钮 */
      --toggle-bg:          rgba(255, 255, 255, 0.10);
      --toggle-border:      rgba(255, 255, 255, 0.15);
      --toggle-color:       rgba(255, 255, 255, 0.75);
      --toggle-hover-bg:    rgba(255, 255, 255, 0.18);
    }

    /* ========================================================
       🎨 全局重置与基础样式
       ======================================================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px;
      gap: 36px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--page-bg);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* ========================================================
       ☀️/🌙 主题切换按钮
       ======================================================== */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px 8px 12px;
      background: var(--toggle-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--toggle-border);
      border-radius: 100px;
      color: var(--toggle-color);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
      user-select: none;
    }

    .theme-toggle:hover {
      background: var(--toggle-hover-bg);
    }

    .theme-toggle svg {
      flex-shrink: 0;
    }

    /* ========================================================
       📄 页面标题与描述
       ======================================================== */
    .page-header {
      text-align: center;
      margin-top: 8px;
    }

    .page-header h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .page-header p {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 500px;
      line-height: 1.5;
      transition: color 0.3s ease;
    }

    /* ========================================================
       📦 演示区域容器
       ======================================================== */
    .demo-section {
      width: 100%;
      max-width: 820px;
    }

    .demo-section + .demo-section {
      margin-top: 4px;
    }

    .demo-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .demo-section-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--section-title);
      transition: color 0.3s ease;
    }

    .demo-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* ========================================================
       🪟 方法一：box-shadow + RGBA 背景层
       ======================================================== */
    .nav-bar-m1 {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 16px;
      background: transparent;
    }

    .nav-btn-m1 {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--m1-btn-bg);
      border: 1px solid var(--m1-btn-border);
      border-radius: 12px;
      color: var(--m1-btn-color);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease,
                  border-color 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.35),
        inset 0 -1px 0 rgba(0, 0, 0, 0.04),
        var(--m1-btn-shadow);
      user-select: none;
    }

    .nav-btn-m1:hover {
      background: var(--m1-btn-hover-bg);
      transform: translateY(-1px);
    }

    .nav-btn-m1:active {
      background: var(--m1-btn-active-bg);
      transform: translateY(0) scale(0.97);
      transition: all 0.1s ease;
    }

    .nav-btn-m1.active {
      background: var(--m1-btn-active-bg);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .nav-btn-m1 svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ========================================================
       🪟 方法二：伪元素模糊层
       ======================================================== */
    .nav-bar-m2 {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 16px;
      background: var(--page-bg-alt);
      transition: background 0.3s ease;
    }

    .nav-btn-m2 {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: transparent;
      border: 1px solid var(--m2-btn-border);
      border-radius: 12px;
      color: var(--m2-btn-color);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.3s ease, border-color 0.3s ease,
                  transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--m2-btn-shadow);
      z-index: 1;
      user-select: none;
      overflow: hidden;
    }

    /* 伪元素模糊层：自包含的毛玻璃效果 */
    .nav-btn-m2::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--m2-pseudo-bg);
      filter: var(--m2-pseudo-filter);
      -webkit-filter: var(--m2-pseudo-filter);
      border-radius: inherit;
      z-index: -1;
      pointer-events: none;
      transition: background 0.3s ease, filter 0.3s ease;
    }

    .nav-btn-m2 svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .nav-btn-m2 span {
      position: relative;
      z-index: 1;
    }

    .nav-btn-m2:hover {
      transform: translateY(-1px);
    }

    .nav-btn-m2:hover::before {
      background: linear-gradient(135deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.10) 50%, rgba(200,220,255,0.15) 100%);
      filter: blur(10px);
    }

    .nav-btn-m2:active {
      transform: translateY(0) scale(0.97);
      transition: all 0.1s ease;
    }

    .nav-btn-m2.active {
      border-color: rgba(255, 255, 255, 0.25);
    }

    .nav-btn-m2.active::before {
      background: linear-gradient(135deg, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0.15) 50%, rgba(200,220,255,0.20) 100%);
      filter: blur(6px);
    }

    /* ========================================================
       🍎 方法三：Apple Liquid Glass（完整玻璃层叠方案）
       ======================================================== */

    /* 导航容器：自建多层渐变背景，模拟玻璃后的彩色环境 🎨 */
    .nav-bar-m3 {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 20px;
      position: relative;
      background:
        var(--m3-bar-bg-1),
        var(--m3-bar-bg-2),
        var(--m3-bar-bg-3),
        var(--m3-bar-base);
      box-shadow: var(--m3-bar-box-shadow);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    /* Apple Liquid Glass 风格导航按钮 */
    .nav-btn-m3 {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      background: var(--m3-btn-bg);
      backdrop-filter: var(--m3-backdrop-filter);
      -webkit-backdrop-filter: var(--m3-backdrop-filter);
      border: 1px solid var(--m3-btn-border);
      border-radius: 14px;
      color: var(--m3-btn-color);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.35s ease,
                  border-color 0.35s ease,
                  transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.35s ease;
      box-shadow:
        var(--m3-btn-shadow-inset),
        var(--m3-btn-shadow-drop);
      overflow: hidden;
      user-select: none;
      will-change: transform, opacity;
    }

    /* 🍎 表面高光伪元素：模拟玻璃表面的方向性高光反射 ✨ */
    .nav-btn-m3::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--m3-highlight);
      pointer-events: none;
      z-index: 1;
      transition: background 0.35s ease, opacity 0.35s ease;
    }

    .nav-btn-m3 svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .nav-btn-m3 span {
      position: relative;
      z-index: 2;
    }

    /* 🖱️ Hover 悬浮态：玻璃增厚、高光增强 */
    .nav-btn-m3:hover {
      background: var(--m3-hover-bg);
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.40),
        0 8px 32px rgba(0, 0, 0, 0.18);
    }

    .nav-btn-m3:hover::before {
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.50) 0%,
        rgba(255, 255, 255, 0.12) 30%,
        transparent 60%,
        rgba(255, 255, 255, 0.05) 85%,
        rgba(255, 255, 255, 0.12) 100%
      );
    }

    /* 👆 Active 点击态：按压反馈 */
    .nav-btn-m3:active {
      transform: translateY(0) scale(0.97);
      background: var(--m3-active-bg);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.20),
        0 2px 8px rgba(0, 0, 0, 0.12);
      transition: all 0.1s ease;
    }

    .nav-btn-m3:active::before {
      opacity: 0.5;
    }

    /* 🎯 选中态：更亮、更突出 */
    .nav-btn-m3.active {
      background: var(--m3-active-bg);
      border-color: var(--m3-active-border);
      color: var(--m3-active-color);
      box-shadow: var(--m3-active-shadow);
    }

    .nav-btn-m3.active::before {
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.45) 0%,
        rgba(255, 255, 255, 0.12) 30%,
        transparent 55%,
        rgba(255, 255, 255, 0.06) 85%,
        rgba(255, 255, 255, 0.12) 100%
      );
    }

    /* 选中态底部指示条 */
    .nav-btn-m3.active::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      border-radius: 2px;
      background: var(--m3-indicator-bar);
      box-shadow: 0 0 8px var(--m3-indicator-glow);
      z-index: 2;
    }

    /* ========================================================
       🎬 入场动画
       ======================================================== */
    @keyframes glassFadeIn {
      0% {
        opacity: 0;
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        transform: translateY(0);
      }
    }

    .demo-section .nav-btn-m1,
    .demo-section .nav-btn-m2,
    .demo-section .nav-btn-m3 {
      animation: glassFadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .demo-section .nav-btn-m1:nth-child(1),
    .demo-section .nav-btn-m2:nth-child(1),
    .demo-section .nav-btn-m3:nth-child(1) { animation-delay: 0ms; }

    .demo-section .nav-btn-m1:nth-child(2),
    .demo-section .nav-btn-m2:nth-child(2),
    .demo-section .nav-btn-m3:nth-child(2) { animation-delay: 60ms; }

    .demo-section .nav-btn-m1:nth-child(3),
    .demo-section .nav-btn-m2:nth-child(3),
    .demo-section .nav-btn-m3:nth-child(3) { animation-delay: 120ms; }

    .demo-section .nav-btn-m1:nth-child(4),
    .demo-section .nav-btn-m2:nth-child(4),
    .demo-section .nav-btn-m3:nth-child(4) { animation-delay: 180ms; }

    /* ========================================================
       🌐 浏览器降级
       ======================================================== */
    @supports not (backdrop-filter: blur(1px)) {
      .nav-btn-m3 {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: none;
      }
    }

    /* ========================================================
       📱 响应式设计（Mobile-first → 桌面增强）
       ======================================================== */

    /* 移动端：按钮紧凑排列 */
    @media (max-width: 639px) {
      body {
        padding: 20px 12px;
        gap: 28px;
      }

      .page-header h1 {
        font-size: 20px;
      }

      .page-header p {
        font-size: 13px;
      }

      .nav-bar-m1,
      .nav-bar-m2,
      .nav-bar-m3 {
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        padding: 10px;
      }

      .nav-btn-m1,
      .nav-btn-m2,
      .nav-btn-m3 {
        padding: 8px 14px;
        font-size: 12px;
        gap: 4px;
        flex: 0 0 auto;
      }

      .nav-btn-m1 svg,
      .nav-btn-m2 svg,
      .nav-btn-m3 svg {
        width: 14px;
        height: 14px;
      }

      .theme-toggle {
        top: 12px;
        right: 12px;
        padding: 6px 12px 6px 10px;
        font-size: 12px;
      }

      .demo-section-header h2 {
        font-size: 14px;
      }
    }

    /* 平板及桌面：完整尺寸 */
    @media (min-width: 640px) {
      .nav-btn-m1,
      .nav-btn-m2 {
        padding: 10px 22px;
      }

      .nav-btn-m3 {
        padding: 11px 26px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body class="theme-dark">

  <!-- ☀️/🌙 主题切换 -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">

  <script>
    // ===================================================================
    //   ☀️/🌙 主题切换
    // ===================================================================
    (function() {
      const toggle  = document.getElementById('themeToggle');
      const icon    = document.getElementById('themeIcon');
      const label   = document.getElementById('themeLabel');
      const body    = document.body;

      function setTheme(dark) {
        body.classList.toggle('theme-dark', dark);
        if (dark) {
          icon.innerHTML =
            '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
          label.textContent = '夜间';
        } else {
          icon.innerHTML =
            '<circle cx="12" cy="12" r="5"/>' +
            '<line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>' +
            '<line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>' +
            '<line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>' +
            '<line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
          label.textContent = '日间';
        }
      }

      toggle.addEventListener('click', function() {
        const isDark = body.classList.contains('theme-dark');
        setTheme(!isDark);
      });
    })();

    // ===================================================================
    //   🎯 选中态切换（每个导航组独立）
    // ===================================================================
    document.querySelectorAll('[data-nav]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const navGroup = this.getAttribute('data-nav');
        document.querySelectorAll('[data-nav="' + navGroup + '"]').forEach(function(b) {
          b.classList.remove('active');
        });
        this.classList.add('active');
      });
    });
  </script>
